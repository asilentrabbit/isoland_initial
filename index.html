<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - isoland</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    }

    .container {
      max-width: 600px;
      width: 100%;
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 10vh;
    }

    .scene {
      position: relative;
      width: 200px;
      height: 150px;
      margin: 0 auto 40px;
    }

    .scene::before {
      content: '';
      position: absolute;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, rgba(190, 190, 190, 0.18) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .dove {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 52px;
      line-height: 1;
      filter: grayscale(0.4);
      opacity: 0.75;
      animation: doveFloat 4s ease-in-out infinite;
    }

    @keyframes doveFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-10px); }
    }

    .island {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 70px;
      background: linear-gradient(180deg, #dbdbdb 0%, #cacaca 35%, #bdbdbd 100%);
      border-radius: 46% 54% 48% 52% / 65% 65% 35% 35%;
    }

    .title {
      font-family: Georgia, 'Times New Roman', 'Noto Serif', serif;
      font-size: 32px;
      font-weight: 400;
      color: #333;
      letter-spacing: 0.02em;
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 15px;
      color: #666;
      margin-bottom: 36px;
      line-height: 1.6;
      letter-spacing: 0.01em;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 12px 36px;
      font-size: 15px;
      color: #555;
      background: #e8e8e8;
      border-radius: 30px;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: all 0.35s ease;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover {
      background: #9e9e9e;
      color: #fff;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px 16px;
        margin-bottom: 6vh;
      }

      .scene {
        width: 160px;
        height: 130px;
        margin-bottom: 32px;
      }

      .island {
        width: 150px;
        height: 60px;
      }

      .dove {
        font-size: 44px;
      }

      .title {
        font-size: 26px;
      }

      .subtitle {
        font-size: 14px;
        margin-bottom: 28px;
      }

      .btn {
        padding: 10px 28px;
        font-size: 14px;
      }

      .buttons {
        gap: 14px;
      }
    }

    @media (min-width: 768px) {
      .title {
        font-size: 38px;
      }

      .subtitle {
        font-size: 16px;
      }

      .btn {
        padding: 14px 42px;
        font-size: 16px;
      }

      .buttons {
        gap: 24px;
      }

      .scene {
        width: 220px;
        height: 160px;
        margin-bottom: 44px;
      }

      .island {
        width: 200px;
        height: 78px;
      }

      .dove {
        font-size: 56px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="scene">
      <div class="dove">🕊️</div>
      <div class="island"></div>
    </div>
    <h1 class="title">welcome to isoland</h1>
    <p class="subtitle">请仔细阅读程序介绍以获得更好的使用体验。</p>
    <div class="buttons">
      <a href="about.html" class="btn">程序介绍</a>
      <a href="assessment.html" class="btn">isoland</a>
    </div>
  </div>
  <script></script>
</body>
</html>
