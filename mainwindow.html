<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>isoland</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f5f5;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    .wrapper {
      max-width: 600px;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
    }

    .scene {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      height: 42vh;
      pointer-events: none;
      z-index: 0;
    }

    .dove {
      position: absolute;
      filter: grayscale(1);
      opacity: 0.25;
      font-size: 28px;
      line-height: 1;
    }

    .dove.d1 {
      top: 8%;
      left: 18%;
      font-size: 24px;
      opacity: 0.20;
      animation: doveDrift1 7s ease-in-out infinite;
    }

    .dove.d2 {
      top: 18%;
      left: 38%;
      font-size: 32px;
      opacity: 0.28;
      animation: doveDrift2 8s ease-in-out infinite;
    }

    .dove.d3 {
      top: 5%;
      left: 58%;
      font-size: 20px;
      opacity: 0.18;
      animation: doveDrift3 6.5s ease-in-out infinite;
    }

    .dove.d4 {
      top: 22%;
      left: 72%;
      font-size: 26px;
      opacity: 0.22;
      animation: doveDrift1 7.5s ease-in-out infinite 1s;
    }

    .dove.d5 {
      top: 12%;
      left: 28%;
      font-size: 18px;
      opacity: 0.16;
      animation: doveDrift2 9s ease-in-out infinite 0.5s;
    }

    @keyframes doveDrift1 {
      0%, 100% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-12px) translateX(6px); }
      50% { transform: translateY(-4px) translateX(2px); }
      75% { transform: translateY(-16px) translateX(-4px); }
    }

    @keyframes doveDrift2 {
      0%, 100% { transform: translateY(0) translateX(0); }
      33% { transform: translateY(-10px) translateX(-5px); }
      66% { transform: translateY(-18px) translateX(3px); }
    }

    @keyframes doveDrift3 {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-14px) translateX(-8px); }
    }

    .island-group {
      position: absolute;
      bottom: -8%;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 65%;
    }

    .island-base {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 88%;
      height: 100%;
      background: linear-gradient(180deg, #e6e6e6 0%, #e0e0e0 45%, #dadada 100%);
      border-radius: 52% 48% 55% 45% / 72% 72% 28% 28%;
    }

    .island-top {
      position: absolute;
      bottom: 34%;
      left: 50%;
      transform: translateX(-50%);
      width: 62%;
      height: 55%;
      background: linear-gradient(180deg, #eeeeee 0%, #e6e6e6 100%);
      border-radius: 48% 52% 50% 50% / 65% 65% 35% 35%;
    }

    .island-highlight {
      position: absolute;
      bottom: 42%;
      left: 50%;
      transform: translateX(-50%);
      width: 35%;
      height: 28%;
      background: radial-gradient(ellipse, rgba(245, 245, 245, 0.7) 0%, transparent 70%);
      border-radius: 50%;
    }

    .mist {
      position: absolute;
      bottom: -4%;
      left: 50%;
      transform: translateX(-50%);
      width: 120%;
      height: 36%;
      background: radial-gradient(ellipse, rgba(245, 245, 245, 0.85) 0%, rgba(245, 245, 245, 0.4) 50%, transparent 80%);
      border-radius: 50%;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .hero-scene {
      position: relative;
      width: 120px;
      height: 90px;
      margin: 0 auto 28px;
    }

    .hero-scene::before {
      content: '';
      position: absolute;
      width: 84px;
      height: 84px;
      background: radial-gradient(circle, rgba(190, 190, 190, 0.18) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .hero-dove {
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 31px;
      line-height: 1;
      filter: grayscale(0.4);
      opacity: 0.75;
      animation: heroDoveFloat 4s ease-in-out infinite;
    }

    @keyframes heroDoveFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-6px); }
    }

    .hero-island {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 108px;
      height: 42px;
      background: linear-gradient(180deg, #dbdbdb 0%, #cacaca 35%, #bdbdbd 100%);
      border-radius: 46% 54% 48% 52% / 65% 65% 35% 35%;
    }

    .title {
      font-family: Georgia, 'Times New Roman', 'Noto Serif', serif;
      font-size: 44px;
      font-weight: 400;
      color: #333;
      letter-spacing: 0.04em;
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 15px;
      color: #666;
      margin-bottom: 44px;
      letter-spacing: 0.06em;
      line-height: 1.5;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .card-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 180px;
      padding: 32px 20px;
      background: #fff;
      border-radius: 18px;
      text-decoration: none;
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.04);
      transition: all 0.35s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .card-btn:hover {
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
      transform: translateY(-3px);
    }

    .card-btn:active {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .card-btn.disabled {
      background: #eee;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .card-btn.disabled:hover {
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.04);
      transform: none;
    }

    .card-icon {
      font-size: 32px;
      margin-bottom: 14px;
      filter: grayscale(0.5);
      opacity: 0.7;
      line-height: 1;
    }

    .card-label {
      font-size: 16px;
      color: #555;
      letter-spacing: 0.04em;
      font-weight: 400;
    }

    .card-status {
      font-size: 11px;
      line-height: 1.5;
      letter-spacing: 0.02em;
      text-align: center;
      max-width: 180px;
    }

    .card-status.green { color: #7a9a7a; }
    .card-status.yellow { color: #b0a070; }
    .card-status.red { color: #b08080; }
    .card-status.none { color: #bbb; }

    .back-link {
      position: relative;
      z-index: 1;
      margin-top: 48px;
      padding-bottom: 0;
    }

    .back-link a {
      font-size: 13px;
      color: #666;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color 0.3s ease;
    }

    .back-link a:hover {
      color: #333;
    }

    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      letter-spacing: 0.02em;
      max-width: 90vw;
      text-align: center;
    }

    .toast.show { opacity: 1; }

    @media (max-width: 480px) {
      .wrapper {
        padding: 36px 20px;
      }

      .hero-scene {
        width: 100px;
        height: 75px;
        margin-bottom: 22px;
      }

      .hero-scene::before {
        width: 70px;
        height: 70px;
      }

      .hero-dove {
        font-size: 26px;
      }

      .hero-island {
        width: 90px;
        height: 36px;
      }

      .title {
        font-size: 34px;
      }

      .subtitle {
        font-size: 14px;
        margin-bottom: 34px;
      }

      .cards {
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .card-btn {
        width: 100%;
        max-width: 280px;
        padding: 28px 20px;
      }

      .card-icon {
        font-size: 28px;
        margin-bottom: 10px;
      }

      .card-label {
        font-size: 15px;
      }

      .card-status {
        max-width: 280px;
      }

      .scene {
        height: 36vh;
      }

      .dove {
        font-size: 22px;
      }
    }

    @media (min-width: 768px) {
      .hero-scene {
        width: 140px;
        height: 105px;
        margin-bottom: 32px;
      }

      .hero-scene::before {
        width: 98px;
        height: 98px;
      }

      .hero-dove {
        font-size: 36px;
      }

      .hero-island {
        width: 126px;
        height: 49px;
      }

      .title {
        font-size: 52px;
      }

      .subtitle {
        font-size: 16px;
        margin-bottom: 52px;
      }

      .card-btn {
        width: 200px;
        padding: 36px 24px;
      }

      .card-label {
        font-size: 17px;
      }

      .card-icon {
        font-size: 36px;
      }

      .card-status {
        max-width: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="scene">
      <div class="dove d1">🕊️</div>
      <div class="dove d2">🕊️</div>
      <div class="dove d3">🕊️</div>
      <div class="dove d4">🕊️</div>
      <div class="dove d5">🕊️</div>
      <div class="island-group">
        <div class="island-base"></div>
        <div class="island-top"></div>
        <div class="island-highlight"></div>
      </div>
      <div class="mist"></div>
    </div>

    <div class="content">
      <div class="hero-scene">
        <div class="hero-dove">🕊️</div>
        <div class="hero-island"></div>
      </div>
      <h1 class="title">isoland</h1>
      <p class="subtitle">自渡为岛</p>
      <div class="cards">
        <div class="card-wrapper">
          <a href="archive-home.html" class="card-btn" id="btnArchive">
            <span class="card-icon">📝</span>
            <span class="card-label">记录信息</span>
          </a>
          <span class="card-status" id="statusArchive"></span>
        </div>
        <div class="card-wrapper">
          <a href="correct-home.html" class="card-btn" id="btnCorrect">
            <span class="card-icon">💡</span>
            <span class="card-label">认知对照</span>
          </a>
          <span class="card-status" id="statusCorrect"></span>
        </div>
      </div>
    </div>

    <div class="back-link">
      <a href="index.html">← 返回欢迎页</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var FREQUENCY_LIMIT = 2;
    var FREQUENCY_DAYS = 30;

    var LEVEL_LABELS = { green: '状态良好', yellow: '状态偏高', red: '需要关注' };

    var btnArchive = document.getElementById('btnArchive');
    var statusArchive = document.getElementById('statusArchive');
    var statusCorrect = document.getElementById('statusCorrect');
    var toast = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(function() {
        toast.classList.remove('show');
      }, 3000);
    }

    function getAssessment() {
      try {
        var data = localStorage.getItem('current_assessment');
        if (!data) return null;
        return JSON.parse(data);
      } catch (e) {
        return null;
      }
    }

    function checkFrequencyLimit() {
      try {
        var stored = localStorage.getItem('archive_records');
        if (!stored) return true;
        var list = JSON.parse(stored);
        var cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - FREQUENCY_DAYS);
        var count = 0;
        for (var i = 0; i < list.length; i++) {
          if (new Date(list[i].date) >= cutoff) count++;
        }
        return count < FREQUENCY_LIMIT;
      } catch (e) {
        return true;
      }
    }

    function renderStatus() {
      var assessment = getAssessment();

      if (!assessment) {
        statusArchive.textContent = '尚未完成心理评估';
        statusArchive.className = 'card-status none';
        statusCorrect.textContent = '尚未完成心理评估';
        statusCorrect.className = 'card-status none';
        return;
      }

      var level = assessment.level || 'none';
      var levelText = LEVEL_LABELS[level] || '未知';
      var dateStr = assessment.date || '未知日期';
      var statusText = '当前状态：' + levelText + '（评估于 ' + dateStr + '）';

      var levelClass = LEVEL_LABELS[level] ? level : 'none';

      statusArchive.textContent = statusText;
      statusArchive.className = 'card-status ' + levelClass;
      statusCorrect.textContent = statusText;
      statusCorrect.className = 'card-status ' + levelClass;
    }

    function applyArchiveGate() {
      var assessment = getAssessment();

      if (!assessment || assessment.level !== 'green') {
        btnArchive.classList.add('disabled');
        btnArchive.href = 'javascript:void(0)';
        return 'not_green';
      }

      var completed = localStorage.getItem('archive_completed');
      if (completed === 'true') {
        btnArchive.classList.add('disabled');
        btnArchive.href = 'javascript:void(0)';
        return 'completed';
      }

      if (!checkFrequencyLimit()) {
        btnArchive.classList.add('disabled');
        btnArchive.href = 'javascript:void(0)';
        return 'frequency';
      }

      return 'ok';
    }

    btnArchive.addEventListener('click', function(e) {
      var gate = applyArchiveGate();
      if (gate === 'ok') return;

      e.preventDefault();
      if (gate === 'not_green') {
        showToast('你当前的情绪状态不允许录入新数据。请等到状态更平稳时再来。');
      } else if (gate === 'completed') {
        showToast('你已完成本次信息录入。下次心理评估后可再次录入。');
      } else if (gate === 'frequency') {
        showToast('30天内最多录入2次，请在下个周期再尝试。');
      }
    });

    renderStatus();
    applyArchiveGate();
  </script>
</body>
</html>
