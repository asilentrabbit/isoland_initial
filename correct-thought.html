<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>认知分析 - isoland</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f5f5;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 500px;
      width: 100%;
      padding: 24px 20px 48px;
    }

    .nav-back { margin-bottom: 28px; }

    .nav-back a {
      font-size: 13px;
      color: #999;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color 0.3s ease;
    }

    .nav-back a:hover { color: #666; }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header-title {
      font-family: Georgia, 'Times New Roman', 'Noto Serif', serif;
      font-size: 22px;
      font-weight: 400;
      color: #333;
      letter-spacing: 0.04em;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }

    .section-label {
      font-size: 14px;
      color: #555;
      font-weight: 500;
      letter-spacing: 0.03em;
      margin-bottom: 14px;
    }

    .history-empty {
      text-align: center;
      font-size: 13px;
      color: #bbb;
      padding: 20px 0;
      letter-spacing: 0.03em;
    }

    .record-card {
      background: #fafafa;
      border-radius: 12px;
      padding: 16px 16px;
      margin-bottom: 10px;
      border: 1px solid #eee;
    }

    .record-title {
      font-size: 14px;
      color: #333;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .record-desc {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }

    .btn-compare {
      display: inline-block;
      padding: 8px 20px;
      font-size: 13px;
      color: #555;
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-compare:hover {
      background: #f0f0f0;
      border-color: #b0b0b0;
    }

    .btn-compare.selected {
      background: #9e9e9e;
      color: #fff;
      border-color: #9e9e9e;
    }

    .analysis-area {
      display: none;
    }

    .analysis-area.visible { display: block; }

    .bar-wrapper {
      margin-bottom: 6px;
    }

    .bar-summary {
      font-size: 13px;
      color: #555;
      line-height: 1.8;
      margin-bottom: 14px;
      letter-spacing: 0.02em;
    }

    .bar-summary .calm-line { color: #8a9a80; }

    .bar-summary .current-line { color: #666; }

    .bar-summary strong { font-weight: 600; }

    .bar-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }

    .bar-container {
      position: relative;
      height: 40px;
      margin-bottom: 24px;
    }

    .bar-track {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      height: 6px;
      background: #e8e8e8;
      border-radius: 3px;
    }

    .bar-calm-range {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      height: 6px;
      background: #b8c8b0;
      border-radius: 3px;
      transition: all 0.4s ease;
    }

    .bar-midline {
      position: absolute;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: #8a9a80;
      transition: left 0.4s ease;
    }

    .bar-dot {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.18);
      transition: left 0.4s ease, background 0.3s ease;
      z-index: 2;
    }

    .bar-dot.green { background: #7a9a7a; }
    .bar-dot.yellow { background: #b0a070; }
    .bar-dot.red { background: #b08080; }

    .bar-marks {
      position: relative;
      height: 20px;
      margin-bottom: 8px;
    }

    .bar-mark {
      position: absolute;
      transform: translateX(-50%);
      font-size: 10px;
      color: #999;
      text-align: center;
      white-space: nowrap;
      transition: left 0.4s ease;
    }

    .bar-mark-l {
      top: 0;
      color: #8a9a80;
    }

    .bar-mark-m {
      top: 0;
      color: #8a9a80;
    }

    .bar-mark-r {
      top: 0;
      color: #8a9a80;
    }

    .bar-mark-v {
      top: 0;
      font-weight: 600;
      font-size: 11px;
    }

    .bar-mark-v.green { color: #7a9a7a; }
    .bar-mark-v.yellow { color: #b0a070; }
    .bar-mark-v.red { color: #b08080; }

    .analysis-text {
      font-size: 14px;
      color: #555;
      line-height: 1.9;
      letter-spacing: 0.02em;
      margin-bottom: 24px;
    }

    .calm-actions {
      margin-bottom: 24px;
    }

    .calm-actions-label {
      font-size: 13px;
      color: #555;
      font-weight: 500;
      letter-spacing: 0.03em;
      margin-bottom: 10px;
    }

    .action-tag {
      display: inline-block;
      padding: 6px 12px;
      font-size: 12px;
      color: #666;
      background: #f5f5f5;
      border-radius: 20px;
      margin: 0 6px 6px 0;
      letter-spacing: 0.02em;
    }

    .btn-area {
      text-align: center;
      margin-top: 8px;
    }

    .btn-submit {
      display: inline-block;
      padding: 14px 36px;
      font-size: 14px;
      color: #fff;
      background: #9e9e9e;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.35s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-submit:hover {
      background: #7e7e7e;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    .btn-submit:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      letter-spacing: 0.02em;
      max-width: 90vw;
      text-align: center;
    }

    .toast.show { opacity: 1; }

    .bottom-link { text-align: center; margin-top: 32px; }

    .bottom-link a {
      font-size: 13px;
      color: #bbb;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color 0.3s ease;
    }

    .bottom-link a:hover { color: #888; }

    @media (max-width: 480px) {
      .container { padding: 20px 14px 40px; }
      .card { padding: 20px 16px; border-radius: 14px; }
      .header-title { font-size: 20px; }
      .analysis-text { font-size: 13px; }
      .btn-submit { padding: 12px 28px; font-size: 13px; }
    }

    @media (min-width: 768px) {
      .header-title { font-size: 24px; }
      .card { padding: 28px 28px; }
      .analysis-text { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-back">
      <a href="correct-main.html">← 返回认知对照</a>
    </div>

    <div class="header">
      <h1 class="header-title">认知分析</h1>
    </div>

    <div class="card" id="historyCard">
      <div class="section-label">选择一份冷静期的记录进行对照</div>
      <div id="historyList"></div>
      <div class="history-empty" id="historyEmpty">暂无匹配的冷静期记录。</div>
    </div>

    <div class="card analysis-area" id="analysisArea">
      <div class="section-label" id="analysisLabel"></div>

      <div class="bar-summary" id="barSummary"></div>

      <div class="bar-label">被讨厌可能性对比</div>
      <div class="bar-wrapper">
        <div class="bar-container">
          <div class="bar-track"></div>
          <div class="bar-calm-range" id="barCalmRange"></div>
          <div class="bar-midline" id="barMidline"></div>
          <div class="bar-dot" id="barDot"></div>
        </div>
        <div class="bar-marks">
          <span class="bar-mark bar-mark-l" id="markL">L</span>
          <span class="bar-mark bar-mark-m" id="markM">M</span>
          <span class="bar-mark bar-mark-r" id="markR">R</span>
          <span class="bar-mark bar-mark-v" id="markV">V</span>
        </div>
      </div>

      <div class="analysis-text" id="analysisText"></div>

      <div class="calm-actions" id="calmActions">
        <div class="calm-actions-label">冷静时的你，在此情境下倾向于：</div>
        <div id="calmActionTags"></div>
      </div>
    </div>

    <div class="btn-area">
      <button type="button" class="btn-submit" id="btnSubmit">进入行为对照</button>
    </div>

    <div class="bottom-link">
      <a href="correct-main.html">返回认知对照</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var RECENT_DAYS = 30;
    var RELATION_NAMES = { L1: '至交好友', L2: '朋友', L3: '熟人/一般相识' };

    var historyListEl = document.getElementById('historyList');
    var historyEmpty = document.getElementById('historyEmpty');
    var analysisArea = document.getElementById('analysisArea');
    var analysisLabel = document.getElementById('analysisLabel');
    var barSummary = document.getElementById('barSummary');
    var barCalmRange = document.getElementById('barCalmRange');
    var barMidline = document.getElementById('barMidline');
    var barDot = document.getElementById('barDot');
    var markL = document.getElementById('markL');
    var markM = document.getElementById('markM');
    var markR = document.getElementById('markR');
    var markV = document.getElementById('markV');
    var analysisText = document.getElementById('analysisText');
    var calmActionsEl = document.getElementById('calmActions');
    var calmActionTags = document.getElementById('calmActionTags');
    var toast = document.getElementById('toast');
    var btnSubmit = document.getElementById('btnSubmit');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(function() {
        toast.classList.remove('show');
      }, 3000);
    }

    function getCurrentSituation() {
      try {
        var data = localStorage.getItem('current_situation');
        return data ? JSON.parse(data) : null;
      } catch (e) { return null; }
    }

    function getComparisonData() {
      try {
        var data = localStorage.getItem('comparison_data');
        return data ? JSON.parse(data) : null;
      } catch (e) { return null; }
    }

    function getArchiveRecords() {
      try {
        var data = localStorage.getItem('archive_records');
        return data ? JSON.parse(data) : [];
      } catch (e) { return []; }
    }

    function getRelationKey(relationshipName) {
      if (relationshipName === '至交好友') return 'L1';
      if (relationshipName === '朋友') return 'L2';
      if (relationshipName === '熟人/一般相识') return 'L3';
      return null;
    }

    function findMatchingHistoryRecords() {
      var situation = getCurrentSituation();
      if (!situation) return [];
      var relKey = getRelationKey(situation.relationship);
      if (!relKey) return [];

      var scenarioLabel = situation.self_perception + ' · ' + situation.other_behavior;

      var records = getArchiveRecords();
      var matched = [];

      for (var i = 0; i < records.length; i++) {
        var rec = records[i];
        if (!rec.relationships || !rec.relationships[relKey]) continue;

        var scenarios = rec.relationships[relKey];
        for (var s = 0; s < scenarios.length; s++) {
          if (scenarios[s].label === scenarioLabel) {
            matched.push({
              record: rec,
              scenario: scenarios[s],
              relKey: relKey
            });
            break;
          }
        }
      }

      return matched;
    }

    function renderHistoryList() {
      var matched = findMatchingHistoryRecords();
      historyListEl.innerHTML = '';

      if (matched.length === 0) {
        historyEmpty.style.display = 'block';
        return;
      }

      historyEmpty.style.display = 'none';

      var cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - RECENT_DAYS);

      var recent = [];
      var older = [];
      for (var i = 0; i < matched.length; i++) {
        if (new Date(matched[i].record.date) >= cutoff) {
          recent.push(matched[i]);
        } else {
          older.push(matched[i]);
        }
      }

      recent.sort(function(a, b) { return b.record.id - a.record.id; });

      var displayList = recent.length > 0 ? recent : [matched.reduce(function(a, b) {
        return a.record.id > b.record.id ? a : b;
      })];

      for (var j = 0; j < displayList.length; j++) {
        (function(item, idx) {
          var card = document.createElement('div');
          card.className = 'record-card';

          var dateStr = item.record.date;
          var relName = RELATION_NAMES[item.relKey] || item.relKey;

          card.innerHTML =
            '<div class="record-title">' + dateStr + ' 冷静的自己</div>' +
            '<div class="record-desc">录入于 ' + item.record.date + ' · 关系：' + relName + '</div>' +
            '<button class="btn-compare" data-idx="' + idx + '">与此时的自己对照</button>';

          historyListEl.appendChild(card);

          card.querySelector('.btn-compare').addEventListener('click', function() {
            showAnalysis(item);
            var allBtns = document.querySelectorAll('.btn-compare');
            for (var b = 0; b < allBtns.length; b++) {
              allBtns[b].classList.remove('selected');
            }
            card.querySelector('.btn-compare').classList.add('selected');
          });
        })(displayList[j], j);
      }
    }

    function showAnalysis(item) {
      var lower = item.scenario.dislikeLower;
      var upper = item.scenario.dislikeUpper;
      var mid = Math.round((lower + upper) / 2);

      var situation = getCurrentSituation();
      var v = situation ? situation.dislike_score : 50;

      barCalmRange.style.left = lower + '%';
      barCalmRange.style.width = (upper - lower) + '%';
      barMidline.style.left = mid + '%';

      barDot.style.left = v + '%';
      markL.style.left = lower + '%';
      markL.innerHTML = '<span style="font-weight:500;">L</span> ' + lower + '%';
      markM.style.left = mid + '%';
      markM.innerHTML = '<span style="font-weight:500;">M</span> ' + mid + '%';
      markR.style.left = upper + '%';
      markR.innerHTML = '<span style="font-weight:500;">R</span> ' + upper + '%';
      markV.style.left = v + '%';
      markV.innerHTML = '<span style="font-weight:600;">V</span> ' + v + '%';

      barSummary.innerHTML =
        '<span class="calm-line">' + item.record.date + ' 冷静的你：下限 <strong>' + lower + '%</strong>，中值 <strong>' + mid + '%</strong>，上限 <strong>' + upper + '%</strong></span>' +
        '<br>' +
        '<span class="current-line">此刻的你：<strong>' + v + '%</strong></span>';

      var dotClass, markVClass, analysisContent;

      if (v <= mid) {
        dotClass = 'green';
        markVClass = 'green';
        analysisContent =
          '你目前的想法并没有太偏离当时的估计';
      } else if (v <= upper) {
        dotClass = 'yellow';
        markVClass = 'yellow';
        analysisContent =
          '此时你的思维比当时要负面一些，但是这种偏差并不严重。因为你在意这个人，也在意这段关系，所以更容易紧张。可以试着对比下曾经冷静的自己，希望ta的看法能帮助到你。';
      } else {
        dotClass = 'red';
        markVClass = 'red';
        analysisContent =
          '此时你的判断与冷静时的预估严重偏离了。isoland提醒您：出现这种情况时，往往不是世界真的变糟了，而是情绪暂时遮住了其他的光。同样的情境下，那个更平静的你觉得被讨厌的可能性在 ' + lower + '% 到 ' + upper + '% 之间。希望你可以得到些参考和安慰。';
      }

      barDot.className = 'bar-dot ' + dotClass;
      markV.className = 'bar-mark bar-mark-v ' + markVClass;

      analysisText.textContent = analysisContent;
      analysisLabel.textContent = item.record.date + ' 冷静的自己 · 关系：' + RELATION_NAMES[item.relKey];

      var actions = item.scenario.actions || [];
      calmActionTags.innerHTML = '';
      if (actions.length > 0) {
        for (var a = 0; a < actions.length; a++) {
          var tag = document.createElement('span');
          tag.className = 'action-tag';
          tag.textContent = actions[a];
          calmActionTags.appendChild(tag);
        }
        calmActionsEl.style.display = 'block';
      } else {
        calmActionsEl.style.display = 'none';
      }

      analysisArea.classList.add('visible');
      setTimeout(function() {
        analysisArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }

    btnSubmit.addEventListener('click', function() {
      window.location.href = 'correct-behavior.html';
    });

    renderHistoryList();
  </script>
</body>
</html>
